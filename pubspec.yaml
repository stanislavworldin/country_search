name: country_search
description: Localized Flutter country picker with fast search, flexible Builder API, and standalone CountryFlag emoji/svg widgets.
version: 3.0.0
homepage: https://github.com/stanislavworldin/country_search
repository: https://github.com/stanislavworldin/country_search
issue_tracker: https://github.com/stanislavworldin/country_search/issues
documentation: https://github.com/stanislavworldin/country_search#readme
topics:
  - country
  - picker
  - flags
  - phone
  - search

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  # No assets needed for this package screenshots:

screenshots:
  - description: "Country Picker with search functionality"
    path: screenshots/1.png
  - description: "Standalone CountryFlag widget usage"
    path: screenshots/2.png
